<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil e assinatura | NextStock</title>
  <style>
    :root{--navy:#071b31;--cyan:#00cfcf;--bg:#f4f7fb;--card:#fff;--muted:#64748b;--ok:#16794b;--danger:#b42318;--info:#155eef}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:#172033;font:14px/1.5 Arial,sans-serif}
    .app{display:flex;min-height:100vh;width:100%}
    .sidebar{width:16vw;background:var(--navy);height:100vh;position:fixed;top:0;left:0;color:#fff;display:flex;flex-direction:column;padding-top:18px;overflow-y:auto}
    .sidebar::-webkit-scrollbar{width:6px}.sidebar::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:5px}
    .sidebar h2{text-align:center;margin-bottom:20px;color:var(--cyan);font-size:1.5rem}
    .menu{list-style:none;margin:0;padding:0 8px 18px}.menu li{padding:13px 18px;cursor:pointer;transition:background .3s;font-size:18px;border-radius:6px;line-height:1.2}.menu a{text-decoration:none;color:inherit;display:block}
    main{margin-left:16vw;width:calc(100% - 16vw);padding:28px;min-width:0}.header h1,.card h2,.card h3{margin-top:0}.header p,.helper{color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:var(--card);border:1px solid #dbe4ef;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 5px 20px rgba(7,27,49,.05)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{display:grid;gap:5px;font-weight:700}
    input,select,button{min-height:40px;border:1px solid #cbd5e1;border-radius:9px;padding:8px 11px;font:inherit}input,select{width:100%;background:#fff}
    button{border:0;background:var(--info);color:#fff;font-weight:700;cursor:pointer}button.secondary{background:#e7eef8;color:#16345b}button.danger{background:var(--danger)}button:disabled{opacity:.55;cursor:not-allowed}
    .actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.status{padding:11px;border-radius:9px;margin-bottom:14px;background:#e7eef8}.status.error{background:#fee4e2;color:#8a1c14}.status.success{background:#dcfae6;color:#11653f}
    .subscription{border:1px solid #cbd5e1;border-radius:12px;padding:14px;margin-bottom:15px}.subscription strong{display:block;font-size:18px}.badge{display:inline-block;padding:4px 9px;border-radius:99px;background:#e7eef8;font-weight:800;margin-top:7px}
    .plans{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.plan{border:1px solid #dbe4ef;border-radius:12px;padding:14px;display:grid;gap:8px}.plan img{width:70px;height:70px;object-fit:contain}.price{font-size:20px;font-weight:900}
    .machines{display:grid;gap:9px;margin-bottom:14px}.machine{border:1px solid #dbe4ef;border-radius:10px;padding:12px;cursor:pointer}.machine.selected{border-color:var(--cyan);background:#efffff}
    @media(max-width:1000px){.app{display:block}.sidebar{width:100%;height:auto;position:relative;align-items:center;text-align:center;padding:15px}.menu{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0}.menu li{padding:10px 12px;font-size:1rem}main{width:100%;margin-left:0;padding:16px}.grid,.plans{grid-template-columns:1fr}}@media(max-width:600px){.form-grid{grid-template-columns:1fr}.full{grid-column:auto}}
  </style>
</head>
<body>
  <div class="app">
    <div id="sidebar-container"></div>
    <main>
      <header class="header"><h1>Perfil da Empresa</h1><p>Gerencie sua conta, assinatura e maquininhas.</p></header>
      <div id="pageStatus" class="status" role="status" aria-live="polite">Carregando...</div>
      <div class="grid">
        <div>
          <section class="card">
            <h2>Conta e empresa</h2>
            <div class="form-grid">
              <label class="full">Nome completo<input id="nomeCompleto"></label>
              <label class="full">E-mail de acesso<input id="profileEmail" type="email" readonly></label>
              <label>Empresa<input id="empresa"></label>
              <label>CNPJ<input id="cnpj"></label>
              <label>E-mail comercial<input id="email" type="email"></label>
              <label>Contato<input id="contato"></label>
            </div>
            <div class="actions"><button id="saveProfileBtn">Salvar perfil</button><button id="saveCompanyBtn">Salvar empresa</button></div>
          </section>

          <section class="card">
            <h2>Assinatura NextStock</h2>
            <div id="subscriptionBox" class="subscription">
              <strong id="currentPlanTitle">Carregando assinatura...</strong>
              <span id="currentPlanBadge" class="badge">Aguarde</span>
              <p id="subscriptionDetails" class="helper"></p>
            </div>
            <div id="plansGrid" class="plans"></div>
          </section>
        </div>

        <section class="card">
          <h2>Maquininhas de pagamento</h2>
          <p class="helper">Configuração operacional do PDV; independente da assinatura do NextStock.</p>
          <div class="actions"><button id="addMachineBtn" class="secondary">+ Nova maquininha</button></div>
          <div id="machineList" class="machines"></div>
          <div class="form-grid">
            <label class="full">Nome<input id="machineName"></label>
            <label>Operadora<select id="machineProvider"><option value="">Selecione</option><option value="stone">Stone</option><option value="pagseguro">PagSeguro</option><option value="mercado_pago">Mercado Pago</option><option value="outro">Outro</option></select></label>
            <label>Modelo<input id="machineModel"></label>
            <label>Taxa (%)<input id="machineFee" type="number" min="0" max="100" step="0.01"></label>
            <label>Status<select id="machineStatus"><option value="ativa">Ativa</option><option value="inativa">Inativa</option><option value="manutencao">Manutenção</option></select></label>
          </div>
          <div class="actions"><button id="saveMachineBtn">Salvar</button><button id="deleteMachineBtn" class="danger">Apagar</button></div>
        </section>
      </div>
    </main>
  </div>
  <script src="./dist/session-state.js"></script>
  <script src="./Js/perfil.js" defer></script>
  <script type="module" src="./dist/sidebar.js"></script>
</body>
</html>
