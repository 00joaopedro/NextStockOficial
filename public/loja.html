<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="index,follow"><meta name="description" content="Vitrine de produtos"><title>Loja</title><link rel="stylesheet" href="/storefront.css"></head>
<body><header><h1 id="storeName">Carregando loja…</h1><p id="storeDescription"></p><button id="cartButton" type="button">Carrinho (<span id="cartCount">0</span>)</button></header>
<main><section class="filters" aria-label="Pesquisa"><label>Pesquisar <input id="search" maxlength="80"></label><button id="searchButton" type="button">Buscar</button></section><p id="message" role="status" aria-live="polite"></p><section id="products" class="grid" aria-label="Produtos"></section><button id="moreButton" type="button" hidden>Carregar mais</button></main>
<dialog id="cartDialog"><form method="dialog"><button class="close" aria-label="Fechar">×</button></form><h2>Seu carrinho</h2><div id="cartItems"></div><form id="checkoutForm"><label>Nome<input name="customerName" maxlength="120" required></label><label>Telefone<input name="customerPhone" inputmode="tel" maxlength="24" required></label><label>E-mail (opcional)<input name="customerEmail" type="email" maxlength="160"></label><label>Atendimento<select name="fulfillmentType" id="fulfillment"><option value="pickup">Retirada</option><option value="delivery">Entrega</option></select></label><fieldset id="address" hidden><legend>Endereço</legend><input name="postalCode" placeholder="CEP"><input name="street" placeholder="Rua"><input name="number" placeholder="Número"><input name="complement" placeholder="Complemento"><input name="neighborhood" placeholder="Bairro"><input name="city" placeholder="Cidade"><input name="state" placeholder="UF" maxlength="2"></fieldset><label>Observação<textarea name="notes" maxlength="500"></textarea></label><button id="checkoutButton" type="submit">Confirmar pedido</button></form><section><h2>Pedidos deste telefone</h2><button id="loadOrders" type="button">Atualizar pedidos</button><div id="orders"></div></section></dialog>
<script src="/storefront.js" defer></script></body></html>
