<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Funcionarios</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00cfcf;
      --panel-bg: #f3f3f3;
      --text-dark: #0d1b2a;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
    }

    html, body { width: 100%; min-height: 100%; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #00a7ad, #0d1b2a);
      color: var(--text-dark);
    }

    .page-content {
      min-height: 100vh;
      display: flex;
      gap: 16px;
      padding: 10px;
      align-items: stretch;
      justify-content: center;
      margin-left: 12%;
    }

    .container,
    .employee-list-panel {
      background: var(--panel-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .container {
      width: min(560px, 100%);
      display: flex;
      flex-direction: column;
      padding: 22px 24px;
    }

    .employee-list-panel {
      width: min(340px, 100%);
      display: flex;
      flex-direction: column;
      padding: 18px 18px 16px;
    }

    .header,
    .list-header {
      background: #434343;
      color: #fff;
      padding: 12px;
      font-weight: bold;
      text-align: center;
      border-radius: 6px;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    form { display: flex; flex-direction: column; gap: 10px; min-height: 0; }

    .form-scroll {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .section-title {
      font-weight: bold;
      color: #00796b;
      border-bottom: 2px solid #00796b;
      margin-top: 2px;
      padding-bottom: 4px;
      font-size: 0.95rem;
    }

    label {
      font-size: 0.88rem;
      font-weight: bold;
      margin-bottom: 4px;
      display: block;
      color: #111;
    }

    input, select {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 0.9rem;
      background: #f8fafc;
    }

    .helper-text {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
    }

    .two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      min-height: 36px;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      transition: opacity 0.2s ease, transform 0.15s ease;
      font-size: 0.9rem;
      padding: 8px 10px;
    }

    .btn:hover { opacity: 0.92; transform: scale(1.02); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn-cadastrar { background: #4caf50; }
    .btn-atualizar { background: #607d8b; }
    .btn-deletar { background: #f44336; }
    .btn-limpar { background: #2196f3; }

    .search-box { margin-bottom: 12px; flex-shrink: 0; }

    .list-scroll {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
    }

    .employee-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .employee-list li {
      background: #f4f6f8;
      border: 1px solid #d9e1e7;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.92rem;
    }

    .employee-list li:hover { background: #dff7f7; border-color: #00b1b1; }
    .employee-list li.active { background: #00cfcf; color: #0d1b2a; border-color: #00cfcf; }

    .employee-name { font-weight: bold; display: block; }
    .employee-meta { color: #53616f; display: block; font-size: 0.8rem; margin-top: 3px; }

    .empty-message {
      color: #666;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 10px;
      padding: 8px 0;
    }

    .status-message {
      min-height: 22px;
      font-size: 0.86rem;
      color: #334155;
      margin-top: 8px;
    }

    .status-message.error { color: #b91c1c; }
    .status-message.success { color: #166534; }

    @media (max-width: 1100px) {
      .page-content {
        flex-direction: column;
        align-items: center;
        margin-left: 0;
      }

      .container,
      .employee-list-panel {
        width: min(92%, 760px);
      }
    }

    @media (max-width: 680px) {
      .two-columns,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <main class="page-content">
    <section class="container" aria-labelledby="employee-title">
      <div class="header" id="employee-title">Cadastro de Funcionarios</div>

      <form id="employeeForm" autocomplete="off">
        <div class="form-scroll">
          <div class="section-title">Dados do Funcionario</div>

          <div class="form-group">
            <label for="nomeCompleto">Nome Completo</label>
            <input type="text" id="nomeCompleto" placeholder="Ex: Joao Carlos da Silva" required>
          </div>

          <div class="two-columns">
            <div class="form-group">
              <label for="email">E-mail de Acesso</label>
              <input type="email" id="email" placeholder="funcionario@email.com" required>
              <div class="helper-text">E-mail usado para login.</div>
            </div>

            <div class="form-group">
              <label for="senhaAcesso">Senha de Acesso</label>
              <input type="password" id="senhaAcesso" placeholder="Digite a senha">
              <div class="helper-text">Obrigatoria apenas no cadastro ou reset.</div>
            </div>
          </div>

          <div class="two-columns">
            <div class="form-group">
              <label for="role">Cargo de Acesso</label>
              <select id="role" required>
                <option value="">Selecione</option>
                <option value="admin">Admin</option>
                <option value="gerente">Gerente</option>
                <option value="funcionario">Funcionario</option>
                <option value="estoque">Estoque</option>
                <option value="caixa">Caixa</option>
              </select>
            </div>

            <div class="form-group">
              <label for="cargo">Cargo</label>
              <input type="text" id="cargo" placeholder="Ex: Operador de Caixa" required>
            </div>
          </div>

          <div class="two-columns">
            <div class="form-group">
              <label for="nascimento">Nascimento</label>
              <input type="date" id="nascimento">
            </div>

            <div class="form-group">
              <label for="admissao">Data de Admissao</label>
              <input type="date" id="admissao">
            </div>
          </div>

          <div class="two-columns">
            <div class="form-group">
              <label for="demissao">Data de Demissao</label>
              <input type="date" id="demissao">
            </div>

            <div class="form-group">
              <label for="statusFuncionario">Status</label>
              <select id="statusFuncionario">
                <option value="active">Ativo</option>
                <option value="inactive">Inativo</option>
                <option value="dismissed">Demitido</option>
              </select>
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-cadastrar" onclick="cadastrarFuncionario()">Cadastrar</button>
          <button type="button" class="btn btn-atualizar" onclick="atualizarFuncionario()">Atualizar</button>
          <button type="button" class="btn btn-deletar" onclick="deletarFuncionario()">Desativar</button>
          <button type="button" class="btn btn-limpar" onclick="resetarSenhaFuncionario()">Resetar Senha</button>
          <button type="button" class="btn btn-limpar" onclick="limparFormulario()">Limpar</button>
        </div>

        <p class="status-message" id="statusMessage" role="status"></p>
      </form>
    </section>

    <aside class="employee-list-panel" aria-labelledby="employee-list-title">
      <div class="list-header" id="employee-list-title">Funcionarios</div>

      <div class="search-box">
        <input type="text" id="searchEmployeeInput" placeholder="Pesquisar por nome ou e-mail">
      </div>

      <div class="list-scroll">
        <ul class="employee-list" id="employeeList"></ul>
        <p class="empty-message" id="emptyMessage">Carregando funcionarios...</p>
      </div>
    </aside>
  </main>

  <script src="./Js/funcionario.js" defer></script>
  <script type="module" src="./dist/sidebar.js"></script>
</body>
</html>
