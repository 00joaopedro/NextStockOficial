name: CI security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nextstock_security_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nextstock_security_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/nextstock_security_test?schema=public
      SECURITY_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nextstock_security_test?schema=public
      SUPABASE_URL: http://local-test.localhost:54321
      SUPABASE_PROJECT_REF: local-test
      SUPABASE_ANON_KEY: test-anon-key-at-least-twenty-characters
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-at-least-twenty-characters
      SUPABASE_JWT_SECRET: test-jwt-secret-at-least-twenty-characters
      AUDIT_HASH_SECRET: test-audit-secret-at-least-thirty-two-characters
      SESSION_HASH_SECRET: test-session-secret-at-least-thirty-two-characters
      SESSION_ENFORCEMENT_ENABLED: "false"
      BILLING_EXTERNAL_REFERENCE_SECRET: test-billing-secret-at-least-thirty-two-characters
      MERCADO_PAGO_MODE: sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Static secret and dangerous API checks
        run: npm run security:static
      - run: npx prisma validate
      - run: npx prisma generate
      - name: Bootstrap Supabase roles in isolated CI database
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f scripts/ci/bootstrap-supabase-roles.sql
      - name: Apply migrations to isolated CI database
        run: npm run db:migrate:deploy
      - run: npm run lint:check
      - run: npm run build
      - run: npm run build:frontend
      - run: npm run build:scripts
      - run: npm test -- --runInBand
      - run: npm run test:security
      - run: npm run test:e2e -- --runInBand
      - name: Runtime dependency audit (blocking)
        run: npm run audit:ci
      - name: High severity dependency report
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
